<header>
    <h1>Completed Routines</h1>
    @if (routines().length > 0) {
        <ul class="details">
            <li>{{ routines().length }} sessions</li>
        </ul>
    }
</header>
<main>
    @if (routines().length === 0) {
        <p class="empty">No completed routines yet.</p>
    } @else {
        <ul>
            @for (routine of routines(); track routine.id) {
                <li>
                    <a [routerLink]="['/completed', routine.id]">
                        <b>{{ routine.name }}</b>
                        <span class="date">{{ routine.completedAt | date:'MMM d, HH:mm' }}</span>
                    </a>
                </li>
            }
        </ul>
    }
</main>
