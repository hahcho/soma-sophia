<header>
    <h1>{{ routine().name }}</h1>
    <div class="exercise-progress">
        <h2>
            Exercise
            {{ ongoingRoutine().currentExerciseIndex + 1 }}/{{ routine().totalExercises() }}
        </h2>
        <ss-progress-bar [filled]="ongoingRoutine().exercisesProgress" />
    </div>
</header>
<main>
    <h2>
        Phase {{ ongoingRoutine().phaseIndex + 1 }}
        • {{ ongoingRoutine().currentPhase.name }}
    </h2>
    @if (ongoingRoutine().currentSet.exerciseTargets.length === 1) {
        <ss-set-follow-along
            [set]="ongoingRoutine().currentSet"
            (completed)="moveToNextSet()" />
    } @else {
        <ss-superset-follow-along
            [superset]="ongoingRoutine().currentSet"
            (completed)="moveToNextSet()" />
    }
</main>
