<button class="hamburger" (click)="toggle()" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="overlay" [class.visible]="isOpen()" (click)="close()"></div>

<nav [class.open]="isOpen()">
    <p class="app-name">Soma Sophia</p>
    @if (auth.user(); as user) {
        <p class="username">{{ user.name }}</p>
    }
    @if (auth.isLoggedIn()) {
        <ul>
            <li>
                <a routerLink="/"
                   routerLinkActive="active"
                   [routerLinkActiveOptions]="{exact: true}"
                   (click)="close()">Dashboard</a>
            </li>
            <li>
                <a routerLink="/follow-along"
                   routerLinkActive="active"
                   (click)="close()">Follow Along</a>
            </li>
            <li>
                <a routerLink="/completed"
                   routerLinkActive="active"
                   (click)="close()">Completed</a>
            </li>
        </ul>
        <button class="secondary" (click)="logout()">Sign out</button>
    }
</nav>
