services:
  angular:
    build: ./client
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./client:/app
      - /app/node_modules # Keep node_modules inside container
    environment:
      - NODE_ENV=development
    ports:
      - 4200:4200
    command: npm start -- --host 0.0.0.0

  server:
    build:
      context: ./server
      target: dev
    volumes:
      - ./server:/app
    ports:
      - 8000:8000
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql+psycopg://soma:soma@postgres:5432/soma
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - FRONTEND_URL=http://localhost:4200

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=soma
      - POSTGRES_PASSWORD=soma
      - POSTGRES_DB=soma
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
